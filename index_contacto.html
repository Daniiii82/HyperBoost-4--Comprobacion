<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <link rel="stylesheet" href="assets/Estilos/style.css">
</head>

<body>
    <!--   barra de navegacion -->
    <div class="container-fluid">
        <nav class="navbar navbar-expand-lg navegacion mb-5 ">
            <div class="container-fluid">
                <div class="collapse navbar-collapse " id="navbarNavAltMarkup">
                    <div class="navbar-nav">
                        <a class="navbar-brand text-white" href="index.html">
                            <img src="assets/Imagenes/IconoYlogo.png" alt="Logo de hyperboost es un turbo" width="44"
                                height="35" class="d-inline-block align-text-top">
                            Inicio
                        </a>
                        <a class="nav-link text-white" href="index_nuestros_turbos.html">Nuestros Turbos</a>
                        <a class="nav-link text-white" href="index_contacto.html">Contacto</a>

                    </div>
                </div>
            </div>
        </nav>
    </div>
    <center>
        <div class="container container-fluid">
            <h1>¿Quieres que nos pongamos en contacto?</h1>
            <p>Rellena el siguiente formulario</p>
    </center>


    <!-- formulario -->
    <div class="container container-fluid bg-dark pb-1 pt-1 rounded">
        <form>
            <div class="mb-3 mt-3">
                <label for="exampleInputEmail1" class="form-label">Ingrese su correo</label>
                <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp"
                    placeholder="Eje: Juanito123@gmail.com">

            </div>
            <div class="mb-3">
                <label for="exampleFormControlTextarea1" class="form-label">Cuentanos acerca de tu vehiculo:</label>
                <textarea class="form-control" id="exampleFormControlTextarea1" rows="3"
                    placeholder="Ingrese su informacion"></textarea>
            </div>
            <div class="mb-3">
                <label for="modelo">Selecciona el modelo</label>
                <select class="form-select" aria-label="Default select example">
                    <option selected>Se despliega</option>
                    <option value="1">T04E</option>
                    <option value="2">GTX3582R</option>
                    <option value="3">HyperBoost-XTR-900</option>
                </select>
            </div>
            <button type="button" class="btn btn-outline-danger mb-3">Comprar</button>
        </form>
        <div class="alert alert-success mb-5" role="alert">
            Realiza tus compras con cuidado!!
        </div>
    </div>

    <div class="container container-fluid">
        <h3 class="mt-5">Tu proceso de compra</h3>
        <div class="progress" role="progressbar" aria-label="Animated striped example" aria-valuenow="75"
            aria-valuemin="0" aria-valuemax="100">
            <div class="progress-bar progress-bar-striped progress-bar-animated bg-danger" style="width: 75%"> 75%</div>
        </div>
    </div>
    <br><br><br><br><br><br>
     <footer>
        <p> &copy; Derechos reservados para HyperBoost | <a class="link_naranja" href="index.html">Volver al inicio</a></p>
    </footer>
</body>

</html>
